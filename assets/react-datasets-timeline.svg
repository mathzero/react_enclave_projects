<text x="94.0" y="897.0" font-size="15" font-weight="450" fill="#344054" text-anchor="start" >Published 2022 follow-up frame: 2,494,309 of 3,099,386 adults (80.5%) consented to both</text>
<text x="94.0" y="916.0" font-size="15" font-weight="450" fill="#344054" text-anchor="start" >recontact and routine health-record linkage.</text>
<circle cx="78.0" cy="954.0" r="5" fill="#2a9d8f"/>
<text x="94.0" y="959.0" font-size="15" font-weight="450" fill="#344054" text-anchor="start" >Clinical cohort participants consented for linkage; follow-up studies should be treated as</text>
<text x="94.0" y="978.0" font-size="15" font-weight="450" fill="#344054" text-anchor="start" >linkable where the participant consent covers linkage.</text>
